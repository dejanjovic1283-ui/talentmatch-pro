name: talentmatch-pro

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: talentmatch-backend
    init: true
    restart: unless-stopped
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      PORT: "8000"
      ENVIRONMENT: "development"
      DATABASE_URL: "sqlite:////app/data/talentmatch.db"
      FRONTEND_URL: "http://localhost:8501"
      CORS_ORIGINS: "http://localhost:8501,http://127.0.0.1:8501"
    ports:
      - "8000:8000"
    volumes:
      - backend-data:/app/data
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=4)",
        ]
      interval: 20s
      timeout: 5s
      start_period: 25s
      retries: 5
    networks:
      - talentmatch-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: talentmatch-frontend
    init: true
    restart: unless-stopped
    env_file:
      - path: ./frontend/.env
        required: false
    environment:
      PORT: "8501"
      BACKEND_URL: "http://backend:8000"
      API_BASE_URL: "http://backend:8000"
      STREAMLIT_BROWSER_GATHER_USAGE_STATS: "false"
      STREAMLIT_SERVER_HEADLESS: "true"
    ports:
      - "8501:8501"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8501/_stcore/health', timeout=4)",
        ]
      interval: 20s
      timeout: 5s
      start_period: 30s
      retries: 5
    networks:
      - talentmatch-network

volumes:
  backend-data:
    name: talentmatch-backend-data

networks:
  talentmatch-network:
    name: talentmatch-network
    driver: bridge
